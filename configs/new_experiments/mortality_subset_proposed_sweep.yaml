# EXPERIMENT 4 (FM) — Mortality, foundation models on clinical subsets, MNAR only.
# Subsets: geriatric (85+ & ESI 1/2) and active cancer treatment (admitted cohort).
# native_nan: true → no imputation. 3 seeds x 3 rates x 2 models x 2 subsets = 36 runs.

sweep:
  seed: [42, 123, 456]
  missingness.rate: [0.1, 0.25, 0.5]
  model.type: [contexttab, tabpfn]
  data.subset:
    - {name: geriatric_85_esi12, filters: [{type: age, min: 85}, {type: acuity, values: [1, 2]}]}
    - {name: cancer_tx, type: active_cancer_treatment}

defaults:
  task: in_hospital_mortality
  quick: false
  data:
    embeddings: false
  missingness:
    mechanism: MNAR
    strength: 1.0
    columns: null
    drivers_map: null
  model:
    params:
      native_nan: true        # raw NaN input — FMs handle missingness natively
      n_estimators: 4         # TabPFN (ignored for contexttab)
      bagging: 8              # ConTextTab (ignored for tabpfn)
