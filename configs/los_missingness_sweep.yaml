# Sweep: missingness mechanism × rate × model × seed
# Generates 3 mechanisms × 3 rates × 3 models × 3 seeds = 81 runs
# Run with: python run.py configs/los_missingness_sweep.yaml

sweep:
  seed: [42, 123, 456]
  missingness.mechanism: [MCAR, MAR, MNAR]
  missingness.rate: [0.1, 0.25, 0.5]
  model.type: [mlp, xgboost, contexttab]

defaults:
  task: length_of_stay
  quick: false
  data:
    embeddings: false
  missingness:
    strength: 1.0
    columns: null
    drivers_map: null
  model:
    params:
      # MLP defaults (ignored when model.type=xgboost)
      hidden_dims: [512, 256, 128]
      dropout: 0.2
      epochs: 60
      patience: 10
      batch_size: 512
      lr: 0.001
      # XGBoost defaults (ignored when model.type=mlp)
      n_estimators: 2000
      max_depth: 6
      learning_rate: 0.05
      subsample: 1.0
      colsample_bytree: 1.0
      min_child_weight: 1
      early_stopping_rounds: 50
      n_jobs: 4
      # ConTextTab defaults (ignored when model.type != contexttab)
      bagging: 8
      max_context_rows: 8192
