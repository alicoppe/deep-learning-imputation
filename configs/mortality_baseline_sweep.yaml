# Clean mortality baselines: 2 models × 3 seeds = 6 runs
# Run with: python run.py configs/mortality_baseline_sweep.yaml

sweep:
  seed: [42, 123, 456]
  model.type: [mlp, xgboost]

defaults:
  task: in_hospital_mortality
  quick: false
  data:
    embeddings: false
  model:
    params:
      # MLP defaults (ignored when model.type=xgboost)
      hidden_dims: [512, 256, 128]
      dropout: 0.2
      epochs: 60
      patience: 10
      batch_size: 512
      lr: 0.001
      # XGBoost defaults (ignored when model.type=mlp)
      n_estimators: 2000
      max_depth: 6
      learning_rate: 0.05
      subsample: 1.0
      colsample_bytree: 1.0
      min_child_weight: 1
      early_stopping_rounds: 50
      n_jobs: 4
