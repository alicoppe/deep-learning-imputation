# LOS — proposed architectures x imputers (classical + GAIN) under MNAR only.
# 3 seeds x 3 rates x 2 models x 3 imputers = 54 runs
# Imputers restricted to {mean, mice, gain} for abstract-scale cost.

sweep:
  seed: [42, 123, 456]
  missingness.rate: [0.1, 0.25, 0.5]
  model.type: [contexttab, tabpfn]
  imputation.method: [mean, mice, gain]

defaults:
  task: length_of_stay
  quick: false
  data:
    embeddings: false
  missingness:
    mechanism: MNAR
    strength: 1.0
    columns: null
    drivers_map: null
  model:
    params:
      bagging: 8
      max_context_rows: 8192
  imputation:
    max_iter: 10
    iterations: 10000
    batch_size: 128
