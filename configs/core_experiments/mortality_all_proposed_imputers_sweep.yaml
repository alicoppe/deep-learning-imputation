# Mortality — proposed architectures x imputers under ALL missingness mechanisms.
# 3 seeds x 3 mechanisms x 3 rates x 2 models x 3 imputers = 162 runs

sweep:
  seed: [42, 123, 456]
  missingness.mechanism: [MCAR, MAR, MNAR]
  missingness.rate: [0.1, 0.25, 0.5]
  model.type: [contexttab, tabpfn]
  imputation.method: [mean, mice, gain]

defaults:
  task: in_hospital_mortality
  quick: false
  data:
    embeddings: false
  missingness:
    strength: 1.0
    columns: null
    drivers_map: null
  model:
    params:
      bagging: 8
      max_context_rows: 8192
  imputation:
    max_iter: 10
    iterations: 10000
    batch_size: 128
